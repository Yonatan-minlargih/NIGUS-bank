server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:3002"
              - "http://localhost:3003"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        # User Service - Auth endpoints
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/auth/**

        # User Service - User endpoints
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**

        # Account Service
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/accounts/**

        # Transaction Service
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/transactions/**

        # Card Service
        - id: card-service
          uri: lb://card-service
          predicates:
            - Path=/api/cards/**

        # Admin Service
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/nigus-realm

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: INFO
    com.nigus.bank: DEBUG
resilience4j:
  ratelimiter:
    instances:
      default:
        limitForPeriod: 50               # max 50 requests
        limitRefreshPeriod: 1s           # per 1 second
        timeoutDuration: 0               # non-blocking (reject immediately if limit exceeded)
        registerHealthIndicator: true
      strict-api:                        # for sensitive routes
        limitForPeriod: 10
        limitRefreshPeriod: 10s
        timeoutDuration: 0

  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        registerHealthIndicator: true
      slow-downstream:                   # for routes prone to timeouts
        slidingWindowSize: 20
        failureRateThreshold: 60
        waitDurationInOpenState: 30s